<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>앱 리뷰 크롤러</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">📱</span>
          <span class="logo-text">앱 리뷰 크롤러</span>
        </div>
        <p class="header-sub">앱스토어 & 플레이스토어 리뷰 자동 수집</p>
      </div>
    </header>

    <main class="main">
      <!-- 입력 폼 -->
      <section class="card">
        <h2 class="section-title">크롤링 설정</h2>

        <div class="field">
          <label class="label" for="url">앱 URL</label>
          <div class="url-row">
            <input
              id="url"
              type="text"
              class="input"
              placeholder="https://apps.apple.com/... 또는 https://play.google.com/..."
              autocomplete="off"
            />
            <span id="store-tag" class="store-tag"></span>
          </div>
          <p class="hint">앱스토어 또는 플레이스토어 앱 상세 페이지 URL을 붙여넣으세요.</p>
        </div>

        <div class="field">
          <label class="label">크롤링 개수</label>
          <div class="count-row">
            <button class="cnt-btn" data-v="10">10</button>
            <button class="cnt-btn active" data-v="50">50</button>
            <button class="cnt-btn" data-v="100">100</button>
            <button class="cnt-btn" data-v="200">200</button>
            <button class="cnt-btn" data-v="500">500</button>
            <div class="cnt-custom">
              <input id="count" type="number" class="input-sm" value="50" min="1" max="500" />
              <span class="cnt-unit">개</span>
            </div>
          </div>
        </div>

        <button id="start-btn" class="btn btn-primary" onclick="startCrawl()">
          크롤링 시작
        </button>
      </section>

      <!-- 로딩 -->
      <section id="loading-sec" class="card hidden">
        <div class="loading-inner">
          <div class="spinner-lg"></div>
          <p class="loading-msg">리뷰를 수집하고 있습니다...</p>
          <p class="loading-sub">잠시만 기다려주세요. 개수에 따라 수초~수십초 소요될 수 있습니다.</p>
        </div>
      </section>

      <!-- 인사이트 -->
      <section id="insights-sec" class="card insights-card hidden">
        <div class="insights-head">
          <h2 class="section-title" style="margin-bottom:0">✨ AI 인사이트 분석</h2>
          <span id="insights-badge" class="badge"></span>
        </div>
        <div id="insights-loading" class="insights-loading hidden">
          <div class="spinner"></div>
          <p>부정 리뷰를 분석하고 있습니다...</p>
        </div>
        <div id="insights-body" class="insights-body"></div>
      </section>

      <!-- 리뷰 목록 -->
      <section id="reviews-sec" class="card hidden">
        <div class="reviews-head">
          <h2 class="section-title" style="margin-bottom:0">
            수집된 리뷰
            <span id="rev-count" class="cnt-badge">0</span>
          </h2>
          <div class="filter-row">
            <label class="label" style="margin:0">별점 필터</label>
            <select id="rating-filter" class="select" onchange="filterReviews()">
              <option value="0">전체</option>
              <option value="5">★★★★★</option>
              <option value="4">★★★★</option>
              <option value="3">★★★</option>
              <option value="2">★★</option>
              <option value="1">★</option>
            </select>
          </div>
        </div>

        <div class="dl-row">
          <button class="btn btn-outline" onclick="downloadFile()">⬇ 텍스트 파일 다운로드</button>
          <button id="insights-btn" class="btn btn-insights" onclick="requestInsights()">✨ AI 인사이트 분석</button>
        </div>

        <div id="reviews-list"></div>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
