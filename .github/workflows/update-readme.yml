name: Update README timestamp

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update last updated badge
        run: |
          DATE=$(date -u '+%Y--%m--%d')
          sed -i "s|!\[Last Updated\](https://img.shields.io/badge/updated-[^)]*)|![Last Updated](https://img.shields.io/badge/updated-${DATE}-blue)|" README.md

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: update README timestamp [skip ci]"
          git push
