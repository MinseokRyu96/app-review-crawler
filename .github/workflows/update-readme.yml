name: Update README timestamp

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update last updated badge
        run: |
          python3 - <<'EOF'
          import re, datetime, pathlib

          readme = pathlib.Path("README.md")
          content = readme.read_text()

          date = datetime.datetime.utcnow().strftime("%Y--%m--%d")
          new_badge = f"![Last Updated](https://img.shields.io/badge/updated-{date}-blue)"
          updated = re.sub(
              r'!\[Last Updated\]\(https://img\.shields\.io/badge/updated-[^)]+\)',
              new_badge,
              content,
          )

          if updated != content:
              readme.write_text(updated)
              print(f"Updated badge to {date}")
          else:
              print("Badge pattern not found — skipping")
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: update README timestamp [skip ci]"
          git push
